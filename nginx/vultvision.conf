# /etc/nginx/sites-available/vultvision
# Symlink to sites-enabled after SSL is set up:
#   ln -s /etc/nginx/sites-available/vultvision /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name vultvision.me www.vultvision.me;

    # Certbot will rewrite this block to redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name vultvision.me www.vultvision.me;

    # SSL – filled in by certbot automatically
    # ssl_certificate     /etc/letsencrypt/live/vultvision.me/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vultvision.me/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/vultvision/frontend;
    index index.html;

    # ── Static frontend ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Stored MP4 recordings (served directly by Nginx) ────────────────────
    location /recordings/ {
        alias /var/www/vultvision/recordings/;
        add_header Content-Disposition 'attachment; filename="vultvision-character.mp4"';
        add_header Cache-Control "public, max-age=172800"; # 48h
        types { video/mp4 mp4; }
    }

    # ── Node.js API proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;        # give FFmpeg time to encode
        client_max_body_size 150M;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
